    link_names:
    - right_eef_link
    - left_eef_link
    # cuRobo needs NUMERIC lock values (null -> object-array TypeError in
    # _build_kinematics_with_lock_joints). base = 0 (cuRobo plans with the
    # base at origin; the real moving base is compensated by world_to_base
    # since base_footprint_x's virtual joints are locked here); torso = 0
    # (upright, the driver holds it stiff); gripper fingers = 0.05 (open
    # aperture for approach-planning collision, matches GRIP_OPEN_Q).
    lock_joints:
      base_footprint_rx_joint: 0.0
      base_footprint_ry_joint: 0.0
      base_footprint_rz_joint: 0.0
      base_footprint_x_joint: 0.0
