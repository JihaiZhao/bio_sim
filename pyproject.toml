[project]
name = "bio_sim"
version = "0.1.0"
description = "Biology-lab pick-and-place simulation in Isaac Sim 5.1 + Isaac Lab 2.3 with Dexmate Vega-1 and cuRobo motion planning"
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
    # Heavy runtime deps (isaacsim, isaaclab, curobo) are installed via separate
    # commands in M0 — they come from NVIDIA's pip index or a source build, not
    # PyPI. Listed here once each install path is settled and reproducible.
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bio_sim"]

[tool.uv]
package = true
