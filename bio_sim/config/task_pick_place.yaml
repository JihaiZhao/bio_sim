# MVP offsets. Object/table/marker poses are NOT here -- they are derived
# deterministically from the robot's retract FK in
# scene.BioScene.place_for_validation() so the grasp/place are reachable.

object: object_a

# Desired grasp/table height (m). The anchor search keeps the (IK-checked)
# retract orientation but picks the feasible point whose height is closest
# to this, so the robot grasps low at a realistic table height instead of
# up near its shoulder.
grasp_height: 0.75

pick_marker: A          # navigate here before grasping
place_marker: B         # navigate here before placing

pre_grasp_dz: 0.12      # m above the grasp for the approach / pre-place
lift_dz: 0.15           # m to lift after grasping (clears the table)
retreat_dz: 0.15        # m to lift after releasing
# Place the carried cube a few cm above the table (planning the gripper+
# payload exactly to table height collides with the table obstacle); the
# cube free-falls this gap on release.
place_clearance_dz: 0.05
